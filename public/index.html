<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscription Intelligence</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <p class="eyebrow">Subscription dashboard</p>
          <h1>Subscription Intelligence</h1>
          <p class="subtitle">Minimal tracking. Maximum clarity.</p>
        </div>
        <div class="header-actions">
          <button id="auto-detect-btn" class="ghost-btn" type="button">
            Auto-detect subscriptions
          </button>
          <button id="toggle-add-btn" class="primary-btn" type="button">
            Add Subscription
          </button>
        </div>
        <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
      </header>

      <main class="dashboard">
        <section id="upcoming" class="panel upcoming-panel">
          <div class="section-head">
            <h2>Upcoming Charges</h2>
            <span class="panel-note">Next 7 days</span>
          </div>
          <div id="upcoming-list" class="upcoming-list"></div>
        </section>

        <section id="insights" class="insight-strip"></section>

        <section id="dashboard" class="panel">
          <div class="section-head">
            <h2>Your Subscriptions</h2>
            <span id="subscription-count" class="badge">0 active</span>
          </div>
          <div id="subscription-list" class="card-list"></div>
        </section>

        <section id="add-subscription" class="panel hidden">
          <div class="section-head">
            <h2>Add Subscription</h2>
            <span class="panel-note">Manual entry</span>
          </div>
          <form id="subscription-form" class="form-card">
            <label>
              Service Name
              <input
                type="text"
                name="serviceName"
                placeholder="e.g. Notion Pro"
                required
              />
            </label>
            <label>
              Cost per month (INR)
              <input type="number" name="amount" min="1" step="1" required />
            </label>
            <label>
              Next Billing Date
              <input type="date" name="nextBillingDate" required />
            </label>
            <label>
              Key Platform
              <select name="platform" required>
                <option value="Google Play">Google Play</option>
                <option value="Apple App Store">Apple App Store</option>
                <option value="UPI">UPI</option>
                <option value="PhonePe">PhonePe</option>
                <option value="PhonePe Autopay">PhonePe Autopay</option>
                <option value="Credit Card">Credit Card</option>
                <option value="Bank">Bank</option>
              </select>
            </label>
            <input type="hidden" name="billingCycle" value="Monthly" />
            <button type="submit" class="primary-btn">Save Subscription</button>
          </form>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
