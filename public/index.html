<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscription Intelligence</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>Subscription Intelligence</h1>
        <p>Track recurring payments with clarity.</p>
      </div>
      <nav class="nav">
        <a href="#dashboard">Dashboard</a>
        <a href="#add-subscription">Add</a>
        <a href="#payments">Payments</a>
      </nav>
    </header>

    <main class="container">
      <section id="insights" class="section">
        <h2>Subscription Insights</h2>
        <div id="insight-cards" class="insight-grid"></div>
      </section>

      <section id="dashboard" class="section">
        <div class="section-header">
          <h2>Subscription Dashboard</h2>
          <span id="subscription-count" class="badge">0 active</span>
        </div>
        <div id="subscription-list" class="card-list"></div>
      </section>

      <section id="upcoming" class="section">
        <h2>Upcoming Charges (Next 7 Days)</h2>
        <ul id="upcoming-list" class="upcoming-list"></ul>
      </section>

      <section id="add-subscription" class="section">
        <h2>Add Subscription</h2>
        <form id="subscription-form" class="form-card">
          <label>
            Service Name
            <input
              type="text"
              name="serviceName"
              placeholder="e.g. Notion Pro"
              required
            />
          </label>
          <label>
            Amount (₹)
            <input type="number" name="amount" min="1" step="1" required />
          </label>
          <label>
            Billing Cycle
            <select name="billingCycle" required>
              <option value="Monthly">Monthly</option>
              <option value="Quarterly">Quarterly</option>
              <option value="Yearly">Yearly</option>
            </select>
          </label>
          <label>
            Next Billing Date
            <input type="date" name="nextBillingDate" required />
          </label>
          <button type="submit" class="primary-btn">Add Subscription</button>
        </form>
      </section>

      <section id="payments" class="section">
        <h2>QR Payment Launcher</h2>
        <div class="payment-card">
          <button id="scan-qr-btn" class="primary-btn" type="button">Scan QR</button>
          <div id="payment-method-wrap" class="hidden">
            <label for="payment-method">Choose payment method</label>
            <select id="payment-method">
              <option value="">Select</option>
              <option>Google Pay</option>
              <option>PhonePe</option>
              <option>Paytm</option>
              <option>Bank UPI</option>
              <option>Credit Card</option>
            </select>
          </div>
          <p id="payment-message" class="muted"></p>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
