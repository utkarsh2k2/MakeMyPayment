name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Syntax checks
        run: |
          node --check "server.js"
          node --check "public/app.js"

      - name: Start server and smoke test
        run: |
          set -euo pipefail
          npm start &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          for i in {1..25}; do
            if curl -fsS "http://127.0.0.1:3000" >/dev/null; then
              echo "Server is reachable on port 3000."
              exit 0
            fi
            sleep 1
          done

          echo "Server did not become reachable in time."
          exit 1
